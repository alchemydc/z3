# docker-compose.yml for rpc-router regtest testing
#
# Runs Zebra + Zallet in regtest mode + the rpc-router.
# Completely self-contained; does not touch the production stack.
#
# Usage:
#   cd rpc-router/regtest
#   ./init.sh          # first time: initialize wallet
#   docker compose up -d
#   # Router available at http://localhost:8181
#   # Test: curl -s -X POST -H "Content-Type: application/json" \
#   #   -d '{"jsonrpc":"2.0","method":"getinfo","params":[],"id":1}' \
#   #   http://localhost:8181

services:
  zebra:
    image: zfnd/zebra:4.1.0
    container_name: z3_regtest_zebra
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - ZEBRA_NETWORK__NETWORK=Regtest
      - ZEBRA_RPC__LISTEN_ADDR=0.0.0.0:18232
      - ZEBRA_RPC__ENABLE_COOKIE_AUTH=false
      - ZEBRA_MINING__MINER_ADDRESS=tmSRd1r8gs77Ja67Fw1JcdoXytxsyrLTPJm
      - ZEBRA_HEALTH__LISTEN_ADDR=0.0.0.0:8080
      - ZEBRA_HEALTH__ENFORCE_ON_TEST_NETWORKS=false
      - ZEBRA_STATE__CACHE_DIR=/home/zebra/.cache/zebra
    volumes:
      - zebra_regtest_data:/home/zebra/.cache/zebra
    ports:
      - "18232:18232"
    networks:
      - regtest_net
    healthcheck:
      # Regtest has no peers; check RPC port directly
      test: ["CMD-SHELL", "curl -sf -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"getblockchaininfo\",\"params\":[],\"id\":1}' http://127.0.0.1:18232 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zallet:
    image: z3_zallet:local
    container_name: z3_regtest_zallet
    # zallet image is distroless (no /bin/sh), so CMD-SHELL healthchecks fail.
    restart: unless-stopped
    command: ["--datadir", "/var/lib/zallet", "start"]
    depends_on:
      zebra:
        condition: service_healthy
    environment:
      - RUST_LOG=info
    volumes:
      - zallet_regtest_data:/var/lib/zallet
      - ./config/zallet.toml:/var/lib/zallet/zallet.toml:ro
      - ./config/zallet_identity.txt:/var/lib/zallet/identity.txt:ro
    ports:
      - "28232:28232"
    networks:
      - regtest_net

  rpc-router:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: z3_regtest_router
    restart: unless-stopped
    # In Compose networks, service keys are DNS hostnames.
    # So `zebra` and `zallet` here resolve to those services on regtest_net,
    # regardless of the explicit container_name values above.
    environment:
      - ZEBRA_URL=http://zebra:18232
      - ZALLET_URL=http://zallet:28232
      - RPC_USER=zebra
      - RPC_PASSWORD=zebra
      - LISTEN_PORT=8181
    ports:
      - "8181:8181"
    depends_on:
      zebra:
        condition: service_healthy
      zallet:
        condition: service_started
    networks:
      - regtest_net

volumes:
  zebra_regtest_data:
  zallet_regtest_data:

networks:
  regtest_net:
    driver: bridge
